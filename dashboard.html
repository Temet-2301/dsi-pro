<!DOCTYPE html>
<html>
<head>
  <title>DSI Pro - Tableau de bord</title>
</head>
<body>

<h1>Bienvenue sur DSI Pro</h1>
<p id="message"></p>

<button onclick="allerDSI()">Commencer une DSI</button>

<script>
const utilisateur = localStorage.getItem("utilisateur");

if(utilisateur){
  document.getElementById("message").innerText =
    "Infirmier connecté : " + utilisateur;
} else {
  window.location.href = "index.html";
}

function allerDSI(){
  window.location.href = "patient.html";
}
</script>

</body>
</html>
