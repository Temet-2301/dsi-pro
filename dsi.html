<!DOCTYPE html>
<html>
<head>
  <title>DSI Pro - Nouvelle Évaluation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; padding:20px;">

<h2>Nouvelle Évaluation DSI</h2>

<label>Nom du patient :</label><br>
<input type="text" id="patient"><br><br>

<h3>Besoins fondamentaux (cocher si perturbé)</h3>

<div>
<label><input type="checkbox" value="Respirer"> Respirer</label><br>
<label><input type="checkbox" value="Boire et manger"> Boire et manger</label><br>
<label><input type="checkbox" value="Éliminer"> Éliminer</label><br>
<label><input type="checkbox" value="Se mouvoir"> Se mouvoir</label><br>
<label><input type="checkbox" value="Dormir"> Dormir</label><br>
<label><input type="checkbox" value="Se vêtir"> Se vêtir</label><br>
<label><input type="checkbox" value="Température"> Maintenir la température</label><br>
<label><input type="checkbox" value="Hygiène"> Être propre</label><br>
<label><input type="checkbox" value="Sécurité"> Éviter les dangers</label><br>
<label><input type="checkbox" value="Communiquer"> Communiquer</label><br>
<label><input type="checkbox" value="Croyances"> Croyances et valeurs</label><br>
<label><input type="checkbox" value="Travailler"> Travailler</label><br>
<label><input type="checkbox" value="Se divertir"> Se divertir</label><br>
<label><input type="checkbox" value="Apprendre"> Apprendre</label><br>
</div>

<br>
<button onclick="enregistrer()">Enregistrer</button>
<button onclick="retour()">Retour</button>

<h3>Résumé :</h3>
<pre id="resultat"></pre>

<script>
function enregistrer(){
  const patient = document.getElementById("patient").value;
  const cases = document.querySelectorAll("input[type=checkbox]:checked");

  let liste = [];
  cases.forEach(function(c){
    liste.push(c.value);
  });

  document.getElementById("resultat").textContent =
    "Patient : " + patient + 
    "\nBesoins perturbés : " + (liste.length ? liste.join(", ") : "Aucun");
}

function retour(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
