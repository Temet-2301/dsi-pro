<!DOCTYPE html>
<html>
<head>
  <title>DSI Pro - Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; text-align:center; padding:30px;">

<h1>DSI Pro</h1>
<p>Application infirmière - Par TEMET</p>

<input type="text" id="utilisateur" placeholder="Nom infirmier"><br><br>
<input type="password" id="motdepasse" placeholder="Mot de passe"><br><br>

<button onclick="seConnecter()">Se connecter</button>

<script>
function seConnecter() {
  const utilisateur = document.getElementById("utilisateur").value;
  const passe = document.getElementById("motdepasse").value;

  if (passe === "TEMET" && utilisateur !== "") {
    localStorage.setItem("utilisateur", utilisateur);
    window.location.href = "dashboard.html";
  } else {
    alert("Nom ou mot de passe incorrect");
  }
}
</script>

</body>
</html>
