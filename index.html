<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(pass === "TEMET" && user !== ""){
    localStorage.setItem("user", user);
    window.location.href = "dashboard.html";
  } else {
    alert("Nom ou mot de passe incorrect");
  }
}
</script>
